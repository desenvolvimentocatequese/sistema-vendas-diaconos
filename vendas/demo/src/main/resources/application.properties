spring.application.name=demo

server.port=9090
# Database Configuration (arquivo local: dados persistem após shutdown)
# Pasta ./data criada sob o diretório de trabalho ao subir o app (ex.: vendas/demo/data/)
spring.datasource.url=jdbc:h2:file:./data/sistema-vendas;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
api.security.token.secret=my-super-secret-key-that-must-be-very-long-to-work-properly-with-hs256-algorithm
api.security.token.expiration=86400000

# Frontend URL
app.frontend.url=http://localhost:3000

# Server Configuration
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
