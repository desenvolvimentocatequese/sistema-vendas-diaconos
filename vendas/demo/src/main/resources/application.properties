spring.application.name=demo

# Perfil padrão: local (H2 em arquivo). Homologação: homol. Produção: prod (H2 em arquivo).
spring.profiles.default=local

# ===============================
# JPA / HIBERNATE (comum)
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
api.security.token.secret=my-super-secret-key-that-must-be-very-long-to-work-properly-with-hs256-algorithm
api.security.token.expiration=86400000

# Frontend URL
app.frontend.url=http://localhost:3000

# Server Configuration (Render e outros PaaS injetam PORT)
server.port=${PORT:9090}

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
