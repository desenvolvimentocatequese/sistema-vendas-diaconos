# Desenvolvimento local — H2 em arquivo (dados persistem em ./data/local/)
spring.datasource.url=jdbc:h2:file:./data/local/sistema-vendas;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Dev: recarrega templates Thymeleaf sem reiniciar o app
spring.thymeleaf.cache=false
