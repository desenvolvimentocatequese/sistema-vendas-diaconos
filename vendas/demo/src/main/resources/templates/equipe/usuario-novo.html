<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title">Novo usuário da equipe · Sistema Vendas</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-md mx-auto px-4 py-10">
        <a th:href="@{/dashboard}" class="text-sm text-slate-600 hover:text-slate-900">&larr; Voltar ao painel</a>
        <div class="mt-6 bg-white rounded-xl border border-slate-200 p-8 shadow-sm">
            <h1 class="text-xl font-bold text-slate-900 mb-1">Novo usuário (equipe)</h1>
            <p class="text-sm text-slate-500 mb-6">Crie contas de administrador, usuário comum ou responsável de setor. Clientes usam o cadastro público da loja.</p>

            <div th:if="${success}"
                 class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800"
                 th:text="${success}"></div>
            <div th:if="${error}"
                 class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800"
                 th:text="${error}"></div>

            <form th:action="@{/equipe/usuarios}" method="post" th:object="${cadastroEquipe}" class="space-y-4">
                <div>
                    <label for="nome" class="block text-sm font-medium text-slate-700 mb-1">Nome</label>
                    <input type="text" id="nome" th:field="*{nome}" required
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email (login)</label>
                    <input type="email" id="email" th:field="*{email}" required autocomplete="off"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="senha" class="block text-sm font-medium text-slate-700 mb-1">Senha inicial</label>
                    <input type="password" id="senha" th:field="*{senha}" required autocomplete="new-password"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="cpf" class="block text-sm font-medium text-slate-700 mb-1">CPF (11 dígitos)</label>
                    <input type="text" maxlength="11" id="cpf" th:field="*{cpf}" required
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="telefone" class="block text-sm font-medium text-slate-700 mb-1">Telefone</label>
                    <input type="text" id="telefone" th:field="*{telefone}" required
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="role" class="block text-sm font-medium text-slate-700 mb-1">Perfil</label>
                    <select id="role" th:field="*{role}" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                        <option th:each="r : ${perfisEquipe}" th:value="${r}" th:text="${r}"></option>
                    </select>
                </div>
                <button type="submit"
                        class="w-full rounded-lg bg-slate-900 text-white py-2.5 text-sm font-medium hover:bg-slate-700">
                    Cadastrar usuário
                </button>
            </form>
        </div>
    </div>
</th:block>
</body>
</html>
