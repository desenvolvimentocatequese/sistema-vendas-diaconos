<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head><title th:fragment="title">Cores</title></head>
<body>
<th:block th:fragment="content">
    <div class="max-w-3xl mx-auto px-4 py-8 space-y-6">
        <div class="flex justify-between"><h1 class="text-2xl font-bold">Cores</h1>
            <a th:href="@{/cores/novo}" class="rounded-lg bg-emerald-600 text-white px-4 py-2 text-sm">Nova cor</a></div>
        <table class="min-w-full text-sm bg-white rounded-xl border overflow-hidden">
            <thead><tr class="border-b bg-slate-50"><th class="p-4 text-left">Nome</th><th class="p-4 text-left">Ativo</th><th class="p-4 text-left">Ações</th></tr></thead>
            <tbody class="divide-y">
            <tr th:each="cor : ${cores}">
                <td class="p-4 font-medium" th:text="${cor.nome}"></td>
                <td class="p-4" th:text="${cor.ativo} ? 'Sim' : 'Não'"></td>
                <td class="p-4 flex gap-2">
                    <a th:href="@{/cores/editar/{id}(id=${cor.id})}" class="text-amber-700 text-xs">Editar</a>
                    <a th:href="@{/cores/deletar/{id}(id=${cor.id})}" class="text-red-600 text-xs" onclick="return confirm('Excluir?')">Excluir</a>
                </td>
            </tr></tbody>
        </table>
    </div>
</th:block>
</body>
</html>
