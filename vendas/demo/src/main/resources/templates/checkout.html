<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title">Checkout</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-2xl mx-auto px-4 py-8 space-y-6">
        <h1 class="text-2xl font-bold text-slate-900">Checkout</h1>

        <div class="bg-white rounded-xl border border-slate-200 p-6">
            <p class="text-sm text-slate-600 mb-4">
                Total dos produtos:
                <span class="font-semibold text-slate-900" th:text="'R$ ' + ${#numbers.formatDecimal(total, 1, 2)}">R$ 0</span>
            </p>

            <form th:action="@{/finalizarPedido}" method="post" class="space-y-4">
                <div>
                    <label for="tipoEntrega" class="block text-sm font-medium text-slate-700 mb-1">Tipo de entrega</label>
                    <select name="tipoEntrega" id="tipoEntrega" onchange="toggleEntrega()"
                            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                        <option value="RETIRADA">Retirada</option>
                        <option value="ENTREGA">Entrega</option>
                    </select>
                </div>

                <div id="entrega" class="hidden space-y-3 pt-2 border-t border-slate-100">
                    <div>
                        <label for="cep" class="block text-sm font-medium text-slate-700 mb-1">CEP</label>
                        <input type="text" name="cep" id="cep" onblur="buscarEndereco()"
                               class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <div class="sm:col-span-2">
                            <label for="rua" class="block text-sm font-medium text-slate-700 mb-1">Rua</label>
                            <input type="text" name="rua" id="rua"
                                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label for="numero" class="block text-sm font-medium text-slate-700 mb-1">Número</label>
                            <input type="text" name="numero" id="numero"
                                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                        </div>
                        <div>
                            <label for="cidade" class="block text-sm font-medium text-slate-700 mb-1">Cidade</label>
                            <input type="text" name="cidade" id="cidade"
                                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                        </div>
                    </div>
                </div>

                <button type="submit"
                        class="w-full rounded-lg bg-emerald-600 text-white px-4 py-2.5 text-sm font-medium hover:bg-emerald-500">
                    Finalizar pedido
                </button>
            </form>
        </div>

        <a th:href="@{/carrinho}" class="inline-block text-sm text-slate-600 hover:text-slate-900">Voltar ao carrinho</a>
    </div>

    <script>
        function toggleEntrega() {
            const tipo = document.getElementById('tipoEntrega').value;
            const entregaDiv = document.getElementById('entrega');
            entregaDiv.classList.toggle('hidden', tipo !== 'ENTREGA');
        }
        async function buscarEndereco() {
            const cep = document.getElementById('cep').value.replace(/\D/g, '');
            if (cep.length === 8) {
                const response = await fetch('https://viacep.com.br/ws/' + cep + '/json/');
                const data = await response.json();
                if (!data.erro) {
                    document.getElementById('rua').value = data.logradouro;
                    document.getElementById('cidade').value = data.localidade;
                }
            }
        }
    </script>
</th:block>
</body>
</html>
