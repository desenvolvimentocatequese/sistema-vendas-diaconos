<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title">Catálogo de Itens</title>
</head>
<body>
<th:block th:fragment="content">
    <div th:replace="~{fragments/catalog-toolbar :: toolbar}"></div>

    <div th:if="${param.acesso}" class="max-w-7xl mx-auto px-4 pt-4">
        <div class="rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900">
            Esta área é restrita à equipe. Use o catálogo para solicitar peças.
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <form th:action="@{/catalogoProdutos}" method="get" class="lg:hidden mb-4">
            <input type="text" name="busca" th:value="${busca}" placeholder="Buscar por código ou nome"
                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400">
        </form>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <aside class="lg:col-span-3">
                <form th:action="@{/catalogoProdutos}" method="get" class="bg-white rounded-xl border border-slate-200 p-4 space-y-4">
                    <h2 class="font-semibold text-lg text-slate-900">Filtros</h2>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Busca</label>
                        <input type="text" name="busca" th:value="${busca}" placeholder="Código ou nome"
                               class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Categoria</label>
                        <select name="categoriaId" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                            <option value="">Todas</option>
                            <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}"
                                    th:selected="${categoriaSelecionada != null && categoriaSelecionada == cat.id}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Cor</label>
                        <select name="corId" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                            <option value="">Todas</option>
                            <option th:each="cor : ${cores}" th:value="${cor.id}" th:text="${cor.nome}"
                                    th:selected="${corSelecionada != null && corSelecionada == cor.id}"></option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tamanho</label>
                        <select name="tamanhoId" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                            <option value="">Todos</option>
                            <option th:each="tam : ${tamanhos}" th:value="${tam.id}" th:text="${tam.nome}"
                                    th:selected="${tamanhoSelecionado != null && tamanhoSelecionado == tam.id}"></option>
                        </select>
                    </div>

                    <div class="flex gap-2">
                        <button type="submit" class="flex-1 rounded-lg bg-slate-900 text-white py-2 text-sm hover:bg-slate-700">Aplicar</button>
                        <a th:href="@{/catalogoProdutos}"
                           class="flex-1 rounded-lg border border-slate-300 py-2 text-sm text-center hover:bg-slate-100">Limpar</a>
                    </div>
                </form>
            </aside>

            <section class="lg:col-span-9">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h1 class="text-xl font-semibold text-slate-900">Catálogo de peças</h1>
                        <p class="text-sm text-slate-500" th:if="${modoSolicitacao}">
                            Itens padronizados para corte e costura — controle de quantidades, tamanhos e cores.
                        </p>
                    </div>
                    <p class="text-sm text-slate-500" th:text="${#lists.size(itens)} + ' item(ns)'">0 item(ns)</p>
                </div>

                <div th:if="${#lists.isEmpty(itens)}"
                     class="bg-white rounded-xl border border-slate-200 p-10 text-center text-slate-500">
                    Nenhum item encontrado com os filtros selecionados.
                </div>

                <div th:if="${!#lists.isEmpty(itens)}" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5">
                    <article th:each="item : ${itens}"
                             class="bg-white rounded-xl border border-slate-200 overflow-hidden transition hover:-translate-y-1 hover:shadow-lg">
                        <a th:href="@{/produto/{id}(id=${item.id})}" class="block">
                            <img th:if="${item.imagemPath != null}" th:src="@{|/images/${item.imagemPath}|}"
                                 th:alt="${item.nome}" loading="lazy"
                                 class="h-48 w-full object-cover">
                            <div th:if="${item.imagemPath == null}"
                                 class="h-48 w-full bg-slate-100 flex items-center justify-center text-slate-400 text-sm">
                                <span th:text="${item.codigo}">F03</span>
                            </div>
                        </a>

                        <div class="p-4 space-y-2">
                            <div class="flex items-start justify-between gap-2">
                                <div>
                                    <span class="text-xs font-mono font-bold text-indigo-700 bg-indigo-50 px-2 py-0.5 rounded"
                                          th:text="${item.codigo}">F03</span>
                                    <h2 class="font-semibold leading-tight text-slate-900 mt-1" th:text="${item.nome}">Nome</h2>
                                </div>
                            </div>
                            <p class="text-xs text-slate-500" th:text="${item.categoria?.nome}">Categoria</p>

                            <form th:action="@{/adicionarCarrinho}" method="post" class="space-y-2 pt-1">
                                <input type="hidden" name="itemId" th:value="${item.id}">

                                <div class="grid grid-cols-2 gap-2">
                                    <select name="tamanhoId" required
                                            class="rounded-lg border border-slate-300 px-2 py-2 text-sm">
                                        <option th:each="tam : ${item.tamanhos}" th:value="${tam.id}"
                                                th:text="${tam.nome}"></option>
                                    </select>
                                    <select name="corId" class="rounded-lg border border-slate-300 px-2 py-2 text-sm">
                                        <option value="">Sem cor</option>
                                        <option th:each="c : ${item.cores}" th:value="${c.id}"
                                                th:text="${c.nome}"></option>
                                    </select>
                                </div>

                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" name="quantidade" min="1" value="1"
                                           class="rounded-lg border border-slate-300 px-2 py-2 text-sm">
                                    <button type="submit"
                                            class="rounded-lg bg-emerald-600 text-white text-sm py-2 hover:bg-emerald-500"
                                            th:text="${modoSolicitacao} ? 'Solicitar' : 'Adicionar'">
                                        Adicionar
                                    </button>
                                </div>
                            </form>
                        </div>
                    </article>
                </div>
            </section>
        </div>
    </div>
</th:block>
</body>
</html>
