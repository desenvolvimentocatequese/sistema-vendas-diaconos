<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title">Configuração do Sistema</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-2xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Configuração do sistema</h1>
        <p class="text-sm text-slate-500 mb-6">Apenas administradores podem alterar estas opções.</p>

        <div th:if="${sucesso}" class="mb-4 rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800"
             th:text="${sucesso}"></div>

        <div class="bg-white rounded-xl border border-slate-200 p-6">
            <form th:action="@{/configuracao}" method="post" class="space-y-6">
                <div class="rounded-lg border border-slate-200 p-4 space-y-3">
                    <label class="flex items-start gap-3 cursor-pointer">
                        <input type="checkbox" name="modoSolicitacao" value="true"
                               th:checked="${configuracao.modoSolicitacao}"
                               class="mt-1 rounded border-slate-300 text-emerald-600">
                        <div>
                            <span class="font-medium text-slate-900">Modo solicitação (corte e costura)</span>
                            <p class="text-sm text-slate-500 mt-1">
                                Quando ativo: oculta preços, remove entrega/retirada e troca o conceito de venda por solicitação de peças.
                            </p>
                        </div>
                    </label>
                </div>

                <button type="submit"
                        class="rounded-lg bg-slate-900 text-white px-5 py-2.5 text-sm font-medium hover:bg-slate-700">
                    Salvar configuração
                </button>
            </form>
        </div>
    </div>
</th:block>
</body>
</html>
