<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head><title th:fragment="title">Categorias</title></head>
<body>
<th:block th:fragment="content">
    <div class="max-w-5xl mx-auto px-4 py-8 space-y-6">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold text-slate-900">Categorias de itens</h1>
            <a th:href="@{/categorias/novo}" class="rounded-lg bg-emerald-600 text-white px-4 py-2 text-sm hover:bg-emerald-500">Nova categoria</a>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead><tr class="border-b bg-slate-50 text-slate-600">
                    <th class="p-4 text-left">Ordem</th><th class="p-4 text-left">Nome</th><th class="p-4 text-left">Descrição</th>
                    <th class="p-4 text-left">Ativo</th><th class="p-4 text-left">Ações</th>
                </tr></thead>
                <tbody class="divide-y">
                <tr th:each="cat : ${categorias}">
                    <td class="p-4" th:text="${cat.ordem}"></td>
                    <td class="p-4 font-medium" th:text="${cat.nome}"></td>
                    <td class="p-4 text-slate-600" th:text="${cat.descricao}"></td>
                    <td class="p-4" th:text="${cat.ativo} ? 'Sim' : 'Não'"></td>
                    <td class="p-4 flex gap-2">
                        <a th:href="@{/categorias/editar/{id}(id=${cat.id})}" class="text-amber-700 text-xs">Editar</a>
                        <a th:href="@{/categorias/deletar/{id}(id=${cat.id})}" class="text-red-600 text-xs"
                           onclick="return confirm('Excluir categoria?')">Excluir</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</body>
</html>
