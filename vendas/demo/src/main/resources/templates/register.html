<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title">Cadastro · Sistema Vendas</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-md mx-auto px-4 py-12">
        <div class="bg-white rounded-xl border border-slate-200 p-8 shadow-sm">
            <h1 class="text-xl font-bold text-center text-slate-900 mb-2">Cadastro</h1>
            <p class="text-sm text-center text-slate-500 mb-6">Crie sua conta no sistema.</p>

            <div th:if="${error}"
                 class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-800 text-center"
                 th:text="${error}"></div>

            <form th:action="@{/register}" method="post" th:object="${registerRequest}" class="space-y-4">
                <div>
                    <label for="nome" class="block text-sm font-medium text-slate-700 mb-1">Nome</label>
                    <input type="text" id="nome" th:field="*{nome}" required
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="email" th:field="*{email}" required autocomplete="email"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="senha" class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                    <input type="password" id="senha" th:field="*{senha}" required autocomplete="new-password"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="cpf" class="block text-sm font-medium text-slate-700 mb-1">CPF</label>
                    <input type="text" maxlength="11" id="cpf" th:field="*{cpf}" required
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>

                <div>
                    <label for="telefone" class="block text-sm font-medium text-slate-700 mb-1">Telefone</label>
                    <input type="text" id="telefone" th:field="*{telefone}" required
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="role" class="block text-sm font-medium text-slate-700 mb-1">Tipo de conta</label>
                    <select id="role" th:field="*{role}"
                            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                        <option th:each="role : ${T(com.vendas.system.model.UsuarioRole).values()}" th:value="${role}"
                                th:text="${role}"></option>
                    </select>
                </div>
                <button type="submit"
                        class="w-full rounded-lg bg-emerald-600 text-white py-2.5 text-sm font-medium hover:bg-emerald-500">
                    Cadastrar
                </button>
            </form>

            <p class="mt-6 text-center text-sm text-slate-600">
                Já tem conta?
                <a th:href="@{/login}" class="font-medium text-slate-900 hover:underline">Entrar</a>
            </p>
        </div>
    </div>
</th:block>
</body>
</html>
