<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title">Login · Sistema Vendas</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-sm mx-auto px-4 py-16">
        <div class="bg-white rounded-xl border border-slate-200 p-8 shadow-sm">
            <h1 class="text-xl font-bold text-center text-slate-900 mb-6">Login</h1>
            <form th:action="@{/login}" method="post" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="username" name="username" required autocomplete="username"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <button type="submit"
                        class="w-full rounded-lg bg-slate-900 text-white py-2.5 text-sm font-medium hover:bg-slate-700">
                    Entrar
                </button>
            </form>

            <p th:if="${param.error}" class="mt-4 text-center text-sm text-red-600">Credenciais inválidas.</p>
            <p th:if="${param.logout}" class="mt-4 text-center text-sm text-slate-500">Você saiu com sucesso.</p>
            <p th:if="${param.success}" class="mt-4 text-center text-sm text-emerald-700">Usuário cadastrado com sucesso.</p>

            <p class="mt-6 text-center text-sm text-slate-600">
                Sem conta?
                <a th:href="@{/register}" class="font-medium text-slate-900 hover:underline">Cadastre-se</a>
            </p>
        </div>
    </div>
</th:block>
</body>
</html>
