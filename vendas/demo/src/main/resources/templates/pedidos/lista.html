<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title">Pedidos</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-7xl mx-auto px-4 py-8 space-y-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <h1 class="text-2xl font-bold text-slate-900" th:text="${labelPedidos}">Pedidos</h1>
            <div class="flex gap-2">
                <a th:href="@{/pedidos/kanban}"
                   class="inline-flex rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-100">
                    Kanban
                </a>
                <a th:href="@{/pedidos/novo}"
                   class="inline-flex rounded-lg bg-emerald-600 text-white px-4 py-2 text-sm font-medium hover:bg-emerald-500 shrink-0">
                    <span th:text="'Nova ' + ${labelPedido.toLowerCase()}">Novo pedido</span>
                </a>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead>
                <tr class="border-b border-slate-200 bg-slate-50 text-left text-slate-600">
                    <th class="p-4 font-semibold">ID</th>
                    <th class="p-4 font-semibold">Usuário</th>
                    <th class="p-4 font-semibold">Status</th>
                    <th th:unless="${modoSolicitacao}" class="p-4 font-semibold">Tipo entrega</th>
                    <th th:unless="${modoSolicitacao}" class="p-4 font-semibold">Total</th>
                    <th class="p-4 font-semibold">Criado</th>
                    <th class="p-4 font-semibold">Ações</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-200">
                <tr th:each="pedido : ${pedidos}" class="hover:bg-slate-50/80">
                    <td class="p-4 text-slate-600" th:text="${pedido.id}"></td>
                    <td class="p-4 text-slate-900" th:text="${pedido.usuario?.nome}"></td>
                    <td class="p-4">
                        <span th:if="${pedido.status.name() == 'NOVO'}"
                              class="inline-flex px-2.5 py-1 rounded-full text-xs font-medium bg-slate-200 text-slate-800">NOVO</span>
                        <span th:if="${pedido.status.name() == 'EM_PRODUCAO'}"
                              class="inline-flex px-2.5 py-1 rounded-full text-xs font-medium bg-amber-100 text-amber-800">EM_PRODUCAO</span>
                        <span th:if="${pedido.status.name() == 'FINALIZADO'}"
                              class="inline-flex px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">FINALIZADO</span>
                    </td>
                    <td th:unless="${modoSolicitacao}" class="p-4 text-slate-600" th:text="${pedido.tipoEntrega}"></td>
                    <td th:unless="${modoSolicitacao}" class="p-4 text-slate-900 font-medium" th:text="${pedido.valorTotal}"></td>
                    <td class="p-4 text-slate-600"
                        th:text="${#temporals.format(pedido.dataCriacao, 'dd/MM/yyyy HH:mm')}"></td>
                    <td class="p-4">
                        <div class="flex flex-wrap gap-2">
                            <a th:href="@{/pedidos/{id}(id=${pedido.id})}"
                               class="px-3 py-1.5 rounded-lg border border-slate-300 text-slate-700 text-xs hover:bg-slate-100">Detalhes</a>
                            <a th:href="@{/pedidos/editar/{id}(id=${pedido.id})}"
                               class="px-3 py-1.5 rounded-lg border border-amber-300 text-amber-900 text-xs hover:bg-amber-50">Editar</a>
                            <a th:href="@{/pedidos/deletar/{id}(id=${pedido.id})}"
                               class="px-3 py-1.5 rounded-lg border border-red-200 text-red-700 text-xs hover:bg-red-50"
                               onclick="return confirm('Tem certeza?')">Excluir</a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</body>
</html>
