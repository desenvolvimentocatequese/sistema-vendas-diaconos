<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title" th:text="${pedido.id != null} ? 'Editar pedido' : 'Novo pedido'">Pedido</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-2xl mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold text-slate-900 mb-6"
            th:text="${pedido.id != null} ? 'Editar pedido' : 'Novo pedido'">Pedido</h1>

        <div class="bg-white rounded-xl border border-slate-200 p-6">
            <form th:action="@{/pedidos}" method="post" th:object="${pedido}" class="space-y-5">
                <input type="hidden" th:field="*{id}">

                <div>
                    <label for="enderecoEntrega" class="block text-sm font-medium text-slate-700 mb-1">Endereço de entrega</label>
                    <input type="text" id="enderecoEntrega" th:field="*{enderecoEntrega}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="tipoEntrega" class="block text-sm font-medium text-slate-700 mb-1">Tipo de entrega</label>
                    <select id="tipoEntrega" th:field="*{tipoEntrega}"
                            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                        <option th:each="tipo : ${T(com.vendas.system.model.TipoEntrega).values()}" th:value="${tipo}"
                                th:text="${tipo}"></option>
                    </select>
                </div>
                <div>
                    <label for="taxaEntrega" class="block text-sm font-medium text-slate-700 mb-1">Taxa de entrega</label>
                    <input type="number" step="0.01" id="taxaEntrega" th:field="*{taxaEntrega}"
                           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                </div>
                <div>
                    <label for="observacoes" class="block text-sm font-medium text-slate-700 mb-1">Observações</label>
                    <textarea id="observacoes" th:field="*{observacoes}" rows="4"
                              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"></textarea>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="rounded-lg bg-slate-900 text-white px-5 py-2.5 text-sm font-medium hover:bg-slate-700">
                        Salvar
                    </button>
                    <a th:href="@{/pedidos}"
                       class="rounded-lg border border-slate-300 px-5 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50">
                        Voltar
                    </a>
                </div>
            </form>
        </div>
    </div>
</th:block>
</body>
</html>
