<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title" th:text="${produto?.nome ?: 'Produto'}">Produto</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-4xl mx-auto px-4 py-8 space-y-6">
        <a th:href="@{/catalogoProdutos}" class="text-sm text-slate-600 hover:text-slate-900">&larr; Voltar ao catálogo</a>

        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden lg:flex">
            <div class="lg:w-1/2 bg-slate-50 flex items-center justify-center p-6">
                <img th:if="${produto.imagemPath != null}" th:src="@{|/images/${produto.imagemPath}|}"
                     alt="Produto"
                     class="max-h-80 w-full object-contain rounded-lg border border-slate-200 bg-white">
                <div th:if="${produto.imagemPath == null}"
                     class="h-72 w-full flex items-center justify-center text-slate-400 rounded-lg border border-dashed border-slate-200">
                    Sem imagem
                </div>
            </div>

            <div class="lg:w-1/2 p-6 lg:p-8 space-y-4">
                <h1 class="text-2xl font-bold text-slate-900" th:text="${produto.nome}">Nome</h1>
                <p class="text-sm text-slate-500" th:text="${produto.tipoProduto}">Tipo</p>
                <p class="text-2xl font-semibold text-slate-900"
                   th:text="'R$ ' + ${#numbers.formatDecimal(produto.preco, 1, 2)}">R$ 0</p>

                <div class="text-sm text-slate-600">
                    <span class="font-medium text-slate-700">Cores:</span>
                    <span th:if="${produto.coresDisponiveis == null || produto.coresDisponiveis.isEmpty()}"> Sem variação</span>
                    <span th:each="cor, iter : ${produto.coresDisponiveis}" th:text="${cor + (!iter.last ? ', ' : '')}"></span>
                </div>

                <p th:unless="${usuarioLogado}" class="text-sm text-amber-800 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
                    <a th:href="@{/login}" class="font-medium underline">Faça login</a> para adicionar ao carrinho e finalizar a compra.
                    Sem conta? <a th:href="@{/register}" class="font-medium underline">Cadastre-se como cliente</a>.
                </p>

                <form th:action="@{/adicionarCarrinho}" method="post" class="space-y-4 pt-2 border-t border-slate-100">
                    <input type="hidden" name="produtoId" th:value="${produto.id}">

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="tamanho" class="block text-sm font-medium text-slate-700 mb-1">Tamanho</label>
                            <select id="tamanho" name="tamanho" required
                                    class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                                <option th:each="tamanhoOpt : ${produto.tamanhosDisponiveis}" th:value="${tamanhoOpt}"
                                        th:text="${tamanhoOpt}"></option>
                            </select>
                        </div>
                        <div>
                            <label for="corSel" class="block text-sm font-medium text-slate-700 mb-1">Cor</label>
                            <select id="corSel" name="cor" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                                <option value="">Sem cor</option>
                                <option th:each="corOpt : ${produto.coresDisponiveis}" th:value="${corOpt}"
                                        th:text="${corOpt}"></option>
                            </select>
                        </div>
                        <div>
                            <label for="quantidade" class="block text-sm font-medium text-slate-700 mb-1">Quantidade</label>
                            <input type="number" id="quantidade" name="quantidade" min="1" value="1" required
                                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                        </div>
                        <div class="flex items-end">
                            <button type="submit"
                                    class="w-full rounded-lg bg-emerald-600 text-white px-4 py-2.5 text-sm font-medium hover:bg-emerald-500">
                                Adicionar ao carrinho
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
