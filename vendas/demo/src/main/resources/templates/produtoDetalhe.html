<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head>
    <title th:fragment="title" th:text="${item?.codigo + ' - ' + item?.nome}">Item</title>
</head>
<body>
<th:block th:fragment="content">
    <div class="max-w-4xl mx-auto px-4 py-8 space-y-6">
        <a th:href="@{/catalogoProdutos}" class="text-sm text-slate-600 hover:text-slate-900">&larr; Voltar ao catálogo</a>

        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden lg:flex">
            <div class="lg:w-1/2 bg-slate-50 flex items-center justify-center p-6">
                <img th:if="${item.imagemPath != null}" th:src="@{|/images/${item.imagemPath}|}"
                     alt="Item"
                     class="max-h-80 w-full object-contain rounded-lg border border-slate-200 bg-white">
                <div th:if="${item.imagemPath == null}"
                     class="h-72 w-full flex flex-col items-center justify-center text-slate-400 rounded-lg border border-dashed border-slate-200">
                    <span class="text-3xl font-mono font-bold text-indigo-600" th:text="${item.codigo}">F03</span>
                    <span class="text-sm mt-2">Sem imagem</span>
                </div>
            </div>

            <div class="lg:w-1/2 p-6 lg:p-8 space-y-4">
                <span class="text-sm font-mono font-bold text-indigo-700 bg-indigo-50 px-2 py-1 rounded"
                      th:text="${item.codigo}">F03</span>
                <h1 class="text-2xl font-bold text-slate-900" th:text="${item.nome}">Nome</h1>
                <p class="text-sm text-slate-500" th:text="${item.categoria?.nome}">Categoria</p>

                <div class="text-sm text-slate-600">
                    <span class="font-medium text-slate-700">Cores disponíveis:</span>
                    <span th:if="${item.cores == null || item.cores.isEmpty()}"> Sem variação</span>
                    <span th:each="cor, iter : ${item.cores}" th:text="${cor.nome + (!iter.last ? ', ' : '')}"></span>
                </div>

                <p th:unless="${usuarioLogado}" class="text-sm text-amber-800 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
                    <a th:href="@{/login}" class="font-medium underline">Faça login</a> para adicionar à solicitação.
                    Sem conta? <a th:href="@{/register}" class="font-medium underline">Cadastre-se como cliente</a>.
                </p>

                <form th:action="@{/adicionarCarrinho}" method="post" class="space-y-4 pt-2 border-t border-slate-100">
                    <input type="hidden" name="itemId" th:value="${item.id}">

                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="tamanho" class="block text-sm font-medium text-slate-700 mb-1">Tamanho</label>
                            <select id="tamanho" name="tamanhoId" required
                                    class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                                <option th:each="tamanhoOpt : ${item.tamanhos}" th:value="${tamanhoOpt.id}"
                                        th:text="${tamanhoOpt.nome}"></option>
                            </select>
                        </div>
                        <div>
                            <label for="corSel" class="block text-sm font-medium text-slate-700 mb-1">Cor</label>
                            <select id="corSel" name="corId" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                                <option value="">Sem cor</option>
                                <option th:each="corOpt : ${item.cores}" th:value="${corOpt.id}"
                                        th:text="${corOpt.nome}"></option>
                            </select>
                        </div>
                        <div>
                            <label for="quantidade" class="block text-sm font-medium text-slate-700 mb-1">Quantidade</label>
                            <input type="number" id="quantidade" name="quantidade" min="1" value="1" required
                                   class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
                        </div>
                        <div class="flex items-end">
                            <button type="submit"
                                    class="w-full rounded-lg bg-emerald-600 text-white px-4 py-2.5 text-sm font-medium hover:bg-emerald-500"
                                    th:text="${modoSolicitacao} ? 'Adicionar à solicitação' : 'Adicionar ao carrinho'">
                                Adicionar
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
