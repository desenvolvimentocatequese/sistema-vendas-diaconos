<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head><title th:fragment="title">Estoque</title></head>
<body>
<th:block th:fragment="content">
    <div class="max-w-7xl mx-auto px-4 py-8 space-y-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Estoque de peças</h1>
                <p class="text-sm text-slate-500">Controle de quantidades por item, cor e tamanho</p>
            </div>
            <a th:href="@{/estoque/novo}" class="rounded-lg bg-emerald-600 text-white px-4 py-2 text-sm">Novo registro</a>
        </div>

        <div class="bg-white rounded-xl border p-4">
            <form method="get" th:action="@{/estoque}" class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
                <div><label class="block text-sm mb-1">Item</label>
                    <select name="itemId" class="w-full rounded-lg border px-3 py-2 text-sm">
                        <option value="">Todos</option>
                        <option th:each="i : ${itens}" th:value="${i.id}" th:text="${i.codigo + ' - ' + i.nome}"
                                th:selected="${filtroItemId == i.id}"></option>
                    </select></div>
                <div><label class="block text-sm mb-1">Categoria</label>
                    <select name="categoriaId" class="w-full rounded-lg border px-3 py-2 text-sm">
                        <option value="">Todas</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}"
                                th:selected="${filtroCategoriaId == cat.id}"></option>
                    </select></div>
                <button type="submit" class="rounded-lg bg-slate-900 text-white py-2 text-sm">Filtrar</button>
            </form>
        </div>

        <div class="bg-white rounded-xl border overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead><tr class="border-b bg-slate-50">
                    <th class="p-4 text-left">Código</th><th class="p-4 text-left">Item</th><th class="p-4 text-left">Categoria</th>
                    <th class="p-4 text-left">Cor</th><th class="p-4 text-left">Tamanho</th><th class="p-4 text-left">Qtd</th><th class="p-4 text-left">Ações</th>
                </tr></thead>
                <tbody class="divide-y">
                <tr th:each="e : ${estoques}">
                    <td class="p-4 font-mono text-indigo-700" th:text="${e.item?.codigo}"></td>
                    <td class="p-4" th:text="${e.item?.nome}"></td>
                    <td class="p-4 text-slate-600" th:text="${e.item?.categoria?.nome}"></td>
                    <td class="p-4" th:text="${e.cor != null ? e.cor.nome : '-'}"></td>
                    <td class="p-4" th:text="${e.tamanho?.nome}"></td>
                    <td class="p-4 font-bold" th:text="${e.quantidade}"></td>
                    <td class="p-4 flex gap-2">
                        <a th:href="@{/estoque/editar/{id}(id=${e.id})}" class="text-amber-700 text-xs">Editar</a>
                        <a th:href="@{/estoque/deletar/{id}(id=${e.id})}" class="text-red-600 text-xs" onclick="return confirm('Excluir?')">Excluir</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</th:block>
</body>
</html>
