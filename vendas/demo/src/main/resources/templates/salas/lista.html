<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content})}">
<head><title th:fragment="title">Salas de Costura</title></head>
<body>
<th:block th:fragment="content">
    <div class="max-w-5xl mx-auto px-4 py-8 space-y-6">
        <div class="flex justify-between items-center">
            <h1 class="text-2xl font-bold">Salas de Costura</h1>
            <a th:href="@{/salas/novo}" class="rounded-lg bg-emerald-600 text-white px-4 py-2 text-sm">Nova sala</a>
        </div>
        <table class="min-w-full text-sm bg-white rounded-xl border overflow-hidden">
            <thead>
            <tr class="border-b bg-slate-50 text-left">
                <th class="p-4">Nome</th>
                <th class="p-4">Responsável</th>
                <th class="p-4">Telefone</th>
                <th class="p-4">Ativo</th>
                <th class="p-4">Ações</th>
            </tr>
            </thead>
            <tbody class="divide-y">
            <tr th:each="sala : ${salas}">
                <td class="p-4 font-medium" th:text="${sala.nome}"></td>
                <td class="p-4 text-slate-700" th:text="${sala.responsavel != null ? sala.responsavel : '-'}"></td>
                <td class="p-4 text-slate-700" th:text="${sala.telefone != null ? sala.telefone : '-'}"></td>
                <td class="p-4" th:text="${sala.ativo} ? 'Sim' : 'Não'"></td>
                <td class="p-4 flex gap-2">
                    <a th:href="@{/salas/editar/{id}(id=${sala.id})}" class="text-amber-700 text-xs">Editar</a>
                    <a th:href="@{/salas/deletar/{id}(id=${sala.id})}" class="text-red-600 text-xs"
                       onclick="return confirm('Excluir?')">Excluir</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(salas)}">
                <td class="p-4 text-slate-500" colspan="5">Nenhuma sala de costura cadastrada.</td>
            </tr>
            </tbody>
        </table>
    </div>
</th:block>
</body>
</html>
