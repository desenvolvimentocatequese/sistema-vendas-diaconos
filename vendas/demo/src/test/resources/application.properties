# Testes continuam usando H2 em memória para não ler nem alterar seu banco local em ./data/
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1

# JWT necessário para subir o contexto nos testes
api.security.token.secret=test-secret-key-that-must-be-very-long-to-work-properly-with-hs256-algorithm
api.security.token.expiration=86400000
